<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DABI | Register</title>
    <style>
        body {
            background: #020205;
            color: #9d50bb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .reg-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(157, 80, 187, 0.3);
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 { letter-spacing: 3px; margin-bottom: 30px; color: #9d50bb; }
        input {
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            width: 280px;
            margin-bottom: 15px;
        }
        input:focus { border-color: #9d50bb; }
        button {
            background: #9d50bb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .links { margin-top: 20px; font-size: 13px; color: #888; }
        a { color: #9d50bb; text-decoration: none; }
    </style>
</head>
<body>
    <div class="reg-card">
        <h1>INITIALIZE USER</h1>
        <form action="/register" method="post">
            <input type="text" name="username" placeholder="CHOOSE USERNAME" required><br>
            <input type="password" name="password" placeholder="SET PASSWORD" required><br>
            <button type="submit">Create Identity</button>
        </form>
        <div class="links">
            Zaten bir profiliniz var mı? <a href="/login">Giriş Paneline Dön</a>
        </div>
    </div>
</body>
</html>
